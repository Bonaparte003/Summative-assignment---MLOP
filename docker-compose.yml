name: idetect-summative-machine-learning-pipeline

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    image: avellin/machine_learning_pipeline:api
    ports:
      - "8000:8000"
    environment:
      - DATA_DIR=/app/AffectNet
      - UPLOADS_DIR=/app/data/uploads
      - DATABASE_PATH=/app/data/idetect_retrain.sqlite3
      - OUTPUT_DIR=/app
    volumes:
      - ./models:/app/models
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  ui:
    build:
      context: .
      dockerfile: Dockerfile
      target: ui
    image: avellin/machine_learning_pipeline:ui
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://api:8000
      - DATA_DIR=/app/AffectNet
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  locust:
    build:
      context: .
      dockerfile: locust/Dockerfile
    image: avellin/machine_learning_pipeline:locust
    ports:
      - "8089:8089"
    environment:
      IMAGE_PATH: /fixtures/happy
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
